<!DOCTYPE html>
<html>
<head>
<title>Smart Bin System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    margin: 0;
    padding: 10px;
    display: flex;
    justify-content: center;
}

/* MAIN CARD */
.card {
    width: 100%;
    max-width: 420px;
    background: white;
    border-radius: 14px;
    padding: 16px;
    box-shadow: 0 5px 18px rgba(0,0,0,0.12);
    text-align: center;
}

/* TITLE */
.title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 8px;
}

/* SECTION TEXT */
.section-title {
    font-weight: bold;
    margin-top: 12px;
    font-size: 14px;
}

/* STATUS */
.status {
    color: green;
    font-weight: bold;
    font-size: 16px;
    margin-top: 5px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    background: #2d89ef;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
}

button:active {
    transform: scale(0.98);
}

button:disabled {
    background: #999;
}

/* HISTORY BOX */
.history {
    text-align: left;
    margin-top: 10px;
    max-height: 300px;
    overflow-y: auto;
    padding-right: 5px;
}

/* HISTORY ITEM */
.history-item {
    background: #f7f7f7;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.4;
}

/* QR BOX */
#reader {
    width: 100% !important;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
}

/* SMALL TEXT */
.small {
    font-size: 12px;
    color: gray;
}

/* MOBILE OPTIMIZATION */
@media (max-width: 480px) {

    .card {
        padding: 12px;
        border-radius: 12px;
    }

    .title {
        font-size: 18px;
    }

    button {
        font-size: 15px;
        padding: 13px;
    }

    .history-item {
        font-size: 12px;
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="title" id="binTitle">SMART BIN SYSTEM</div>

    <div class="section-title">📡 Loading bin...</div>

    <div id="binInfo" style="display:none;">

        <div class="section-title" id="block"></div>
        <div class="section-title" id="floor"></div>
        <div class="section-title" id="location"></div>

        <div class="section-title">👷 On Duty</div>
        <div id="dutyPerson">Kumar</div>

        <div class="status" id="status">Status: CLEAN</div>

        <div class="section-title">
            Last Updated: <span id="lastUpdated">--</span>
        </div>

        <button id="cleanBtn" onclick="markClean()">
            Mark as CLEANED
        </button>

        <div class="section-title">📜 History</div>
        <div class="history" id="history">Loading...</div>

    </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyAiF1pMgeVoKa3rrfwA1p7gntEfAIXcczIP9yKB8mRXKxhKxPcB2KbDIhs1BqwJXsQ/exec";

let scannedBin = "";
let isLocked = false;
let lastData = "";

/* ================= GET BIN FROM URL ================= */
function getBinFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get("bin");
}

/* ================= LOAD BIN ================= */
function loadBin(bin) {

    scannedBin = bin;

    document.getElementById("binTitle").innerText =
        "SMART BIN " + bin;

    document.getElementById("binInfo").style.display = "block";

    document.getElementById("block").innerText = "Block: A";
    document.getElementById("floor").innerText = "Floor: 2";
    document.getElementById("location").innerText = "Location: Near Toilet";

    document.getElementById("cleanBtn").disabled = false;

    refreshHistory();
}

/* ================= CLEAN BUTTON ================= */
function markClean() {

    if (isLocked) return;
    isLocked = true;

    let btn = document.getElementById("cleanBtn");
    btn.disabled = true;
    btn.innerText = "Saving...";

    let now = new Date();

    let payload = {
        bin: scannedBin,
        cleaner: document.getElementById("dutyPerson").innerText,
        status: "CLEANED"
    };

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
    })
    .then(res => res.text())
    .then(() => {

        document.getElementById("status").innerText = "Status: CLEAN";

        document.getElementById("lastUpdated").innerText =
            now.toLocaleTimeString();

        refreshHistory();

        btn.innerText = "Already CLEANED";
    })
    .catch(err => {
        console.log(err);
        isLocked = false;
    });
}

/* ================= HISTORY ================= */
function refreshHistory() {

    fetch(API_URL + "?t=" + Date.now())
    .then(res => res.json())
    .then(data => {

        if (JSON.stringify(data) === lastData) return;

        lastData = JSON.stringify(data);

        let html = "";

        data.reverse().forEach(item => {

            html += `
                <div class="history-item">
                    📅 ${item.date} | ⏰ ${item.time}<br>
                    🗑 Bin: ${item.bin}<br>
                    👷 ${item.cleaner} | ${item.status}
                </div>
            `;
        });

        document.getElementById("history").innerHTML = html;
    })
    .catch(err => {
        console.log("History error:", err);
    });
}

/* ================= AUTO START ================= */
window.onload = function () {

    const bin = getBinFromURL();

    if (bin) {
        loadBin(bin);
    } else {
        document.getElementById("binTitle").innerText =
            "NO BIN SCANNED";
    }

    refreshHistory();
};

setInterval(refreshHistory, 5000);

</script>

</body>
</html>
