<!DOCTYPE html>
<html>
<head>
<title>Smart Bin System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    margin: 0;
    padding: 10px;
    display: flex;
    justify-content: center;
}

.card {
    width: 100%;
    max-width: 420px;
    background: white;
    border-radius: 14px;
    padding: 16px;
    box-shadow: 0 5px 18px rgba(0,0,0,0.12);
    text-align: center;
}

.title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 10px;
}

.section-title {
    font-weight: bold;
    margin-top: 10px;
    font-size: 14px;
}

.status {
    color: green;
    font-weight: bold;
    font-size: 16px;
    margin-top: 8px;
}

select {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 8px;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    background: #2d89ef;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
}

button:disabled {
    background: gray;
}

.history {
    text-align: left;
    margin-top: 10px;
    max-height: 300px;
    overflow-y: auto;
}

.history-item {
    background: #f7f7f7;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
    font-size: 13px;
}

.small {
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<div class="card">

    <div class="title" id="binTitle">SMART BIN SYSTEM</div>

    <div class="section-title" id="loadingText">📡 Loading bin...</div>

    <div id="binInfo" style="display:none;">

        <div class="section-title" id="block"></div>
        <div class="section-title" id="floor"></div>
        <div class="section-title" id="location"></div>

        <div class="section-title">👷 Select Cleaner</div>
        <select id="cleanerSelect"></select>

        <div class="status" id="status">Status: CLEAN</div>

        <div class="section-title">
            Last Updated: <span id="lastUpdated">--</span>
        </div>

        <button id="cleanBtn" onclick="markClean()">
            Mark as CLEANED
        </button>

        <div class="section-title">📜 Cleaning History</div>
        <div class="history" id="history">Loading...</div>

    </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzILY7fbQR1xN-vwbirvrkqW6uIyhaePkoe0U4IoruYFcjnxRZDserQDP-jfUNf28q1/exec";

let scannedBin = "";
let isLocked = false;
let lastHistory = "";

/* ================= GET BIN FROM URL ================= */
function getBinFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get("bin");
}

/* ================= LOAD BIN ================= */
function loadBin(binId) {

    scannedBin = binId;

    fetch(API_URL + "?bin=" + binId)
    .then(res => res.json())
    .then(data => {

        document.getElementById("binTitle").innerText =
            "SMART BIN " + data.bin.id;

        document.getElementById("block").innerText =
            "Block: " + data.bin.block;

        document.getElementById("floor").innerText =
            "Floor: " + data.bin.floor;

        document.getElementById("location").innerText =
            "Location: " + data.bin.location;

        document.getElementById("binInfo").style.display = "block";
        document.getElementById("loadingText").style.display = "none";

        // CLEANER DROPDOWN
        let select = document.getElementById("cleanerSelect");
        select.innerHTML = "";

        data.cleaners.forEach(c => {
            select.innerHTML += `<option value="${c}">${c}</option>`;
        });

        loadHistory(data.history);
    });
}

/* ================= CLEAN BUTTON ================= */
function markClean() {

    if (isLocked) return;
    isLocked = true;

    let btn = document.getElementById("cleanBtn");
    btn.disabled = true;
    btn.innerText = "Saving...";

    let payload = {
        bin: scannedBin,
        cleaner: document.getElementById("cleanerSelect").value,
        status: "CLEANED"
    };

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
    })
    .then(res => res.text())
    .then(() => {

        document.getElementById("status").innerText = "Status: CLEAN";
        document.getElementById("lastUpdated").innerText =
            new Date().toLocaleString();

        btn.innerText = "Already CLEANED";
        btn.disabled = true;
    })
    .catch(err => {
        console.log(err);
        isLocked = false;
        btn.disabled = false;
        btn.innerText = "Mark as CLEANED";
    });
}

/* ================= HISTORY ================= */
function loadHistory(history) {

    let html = "";

    history.reverse().forEach(item => {

        html += `
        <div class="history-item">
            📅 ${item.date} | ⏰ ${item.time}<br>
            🗑 Bin: ${item.bin}<br>
            👷 ${item.cleaner} | ${item.status}
        </div>
        `;
    });

    document.getElementById("history").innerHTML = html;
}

/* ================= INIT ================= */
window.onload = function () {

    let bin = getBinFromURL();

    if (!bin) {
        document.getElementById("binTitle").innerText = "NO BIN SELECTED";
        return;
    }

    loadBin(bin);
};

</script>

</body>
</html>
