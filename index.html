<!DOCTYPE html>
<html>
<head>
<title>Smart Bin A2-2</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    margin: 0;
    padding: 0;
}

.card {
    width: 420px;
    margin: 40px auto;
    background: white;
    border-radius: 10px;
    padding: 25px;
    box-shadow: 0 0 12px rgba(0,0,0,0.15);
    text-align: center;
}

.title {
    font-size: 26px;
    font-weight: bold;
}

.line {
    border-top: 1px solid #ccc;
    margin: 15px 0;
}

.section-title {
    font-weight: bold;
    margin-top: 10px;
}

.status {
    color: green;
    font-weight: bold;
    font-size: 18px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #2d89ef;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #1b6fce;
}

.history {
    text-align: left;
    margin-top: 10px;
}

.history-item {
    background: #f7f7f7;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    font-size: 13px;
}

.small {
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<div class="card">

    <div class="title">SMART BIN A2-2</div>

    <div class="line"></div>

    <div class="section-title">Block: A</div>
    <div class="section-title">Floor: 2</div>
    <div class="section-title">Location: Near Toilet</div>

    <div class="line"></div>

    <div class="section-title">👷 On Duty Today</div>
    <div id="dutyPerson">Kumar</div>

    <div class="line"></div>

    <div class="status" id="status">Status: CLEAN</div>

    <div class="small">
        Last Updated: <span id="lastUpdated">--</span>
    </div>

    <button onclick="markClean()">Mark as CLEANED</button>

    <div class="line"></div>

    <div class="section-title">📜 Cleaning History</div>
    <div class="history" id="history">Loading...</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxuxjYrmNr-FHJchOB0W5O-1pLGudOATw6K-M8vgorNuD0Cv87ElImjQdt89leOc_gP/exec";

let lock = false;

// ---------------- CLEAN BUTTON ----------------
function markClean() {

    let btn = document.getElementById("cleanBtn");

    // ❌ disable immediately
    btn.disabled = true;
    btn.innerText = "Processing...";

    let now = new Date();

    let data = {
        date: now.toISOString(),
        time: now.toISOString(),
        bin: "A2-2",
        cleaner: document.getElementById("dutyPerson").innerText,
        status: "CLEANED"
    };

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(() => {

        document.getElementById("status").innerText = "Status: CLEAN";
        document.getElementById("lastUpdated").innerText = formatTime(now);

        loadHistory();

        // ✅ keep disabled after success
        btn.innerText = "Already CLEANED";
        btn.style.background = "gray";
        btn.style.cursor = "not-allowed";

    })
    .catch(err => {

        console.log(err);

        // ❌ if error, enable again
        btn.disabled = false;
        btn.innerText = "Mark as CLEANED";
    });
}

// ---------------- LOAD HISTORY ----------------
function loadHistory() {

    fetch(API_URL + "?t=" + Date.now())
    .then(res => res.json())
    .then(data => {

        let html = "";

        data.reverse().forEach(item => {

            let d = new Date(item.date);

            html += `
                <div class="history-item">
                    📅 ${d.toLocaleDateString()} | ⏰ ${formatTime(d)}<br>
                    🗑 Bin: ${item.bin}<br>
                    👷 ${item.cleaner} | ${item.status}
                </div>
            `;
        });

        document.getElementById("history").innerHTML = html;

    })
    .catch(err => {
        document.getElementById("history").innerHTML =
        "❌ Cannot connect to Google Script";
    });
}

// ---------------- TIME FORMAT ----------------
function formatTime(date) {

    let h = date.getHours();
    let m = date.getMinutes();

    let ampm = h >= 12 ? "PM" : "AM";

    h = h % 12;
    h = h ? h : 12;

    m = m < 10 ? "0" + m : m;

    return h + ":" + m + " " + ampm;
}

window.onload = loadHistory;

</script>

</body>
</html>
