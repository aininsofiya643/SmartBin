<!DOCTYPE html>
<html>
<head>
<title>Smart Bin</title>
<style>
body {
    font-family: Arial;
    text-align: center;
}
.container {
    width: 400px;
    margin: auto;
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 10px;
}
.history-item {
    background: #f5f5f5;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    text-align: left;
}
button {
    padding: 10px 20px;
    background: blue;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>SMART BIN A2-2</h2>

<h3>👷 On Duty Today</h3>
<p id="dutyPerson">Kumar</p>

<h3>Status: <span id="status">CLEAN</span></h3>
<p>Last Updated: <span id="lastUpdated">--</span></p>

<button onclick="markClean()">Mark as CLEANED</button>

<hr>

<h3>📜 Cleaning History</h3>
<div id="history">Loading...</div>

</div>

<script>

// 🔥 YOUR CORRECT API
const API_URL = "https://script.google.com/macros/s/AKfycbxuxjYrmNr-FHJchOB0W5O-1pLGudOATw6K-M8vgorNuD0Cv87ElImjQdt89leOc_gP/exec";

// prevent double click
let isSending = false;

function markClean() {

    if (isSending) return;
    isSending = true;

    let now = new Date();

    let data = {
        date: now.toISOString(),
        time: now.toISOString(),
        bin: "A2-2",
        cleaner: document.getElementById("dutyPerson").innerText,
        status: "CLEANED"
    };

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(() => {

        document.getElementById("status").innerText = "CLEAN";
        document.getElementById("lastUpdated").innerText = formatTime(now);

        loadHistory();

        setTimeout(() => {
            isSending = false;
        }, 10000); // 10 sec anti-duplicate

    })
    .catch(err => {
        console.log(err);
        isSending = false;
    });
}

// ✅ FIXED HISTORY LOADING
function loadHistory() {

    fetch(API_URL + "?t=" + Date.now())
    .then(res => res.json())
    .then(data => {

        let html = "";

        data.reverse().forEach(item => {

            let d = new Date(item.date);

            html += `
                <div class="history-item">
                    📅 ${d.toLocaleDateString()} | ⏰ ${formatTime(d)}<br>
                    🗑 Bin: ${item.bin}<br>
                    👷 ${item.cleaner} | ${item.status}
                </div>
            `;
        });

        document.getElementById("history").innerHTML = html;

    })
    .catch(err => {
        console.log(err);
        document.getElementById("history").innerHTML =
        "❌ Cannot load history";
    });
}

// ⏰ CLEAN TIME FORMAT (6:12 AM)
function formatTime(date) {

    let hours = date.getHours();
    let minutes = date.getMinutes();

    let ampm = hours >= 12 ? "PM" : "AM";

    hours = hours % 12;
    hours = hours ? hours : 12;

    minutes = minutes < 10 ? "0" + minutes : minutes;

    return hours + ":" + minutes + " " + ampm;
}

// auto load
window.onload = loadHistory;

</script>

</body>
</html>
