<!DOCTYPE html>
<html>
<head>
<title>Smart Bin A2-2</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    text-align: center;
}

.card {
    background: white;
    width: 420px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0px 0px 10px #ccc;
}

h2 {
    margin: 5px;
}

.status-clean {
    color: green;
    font-weight: bold;
}

button {
    width: 100%;
    padding: 12px;
    background: #3498db;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #2980b9;
}

.history-box {
    text-align: left;
    margin-top: 15px;
}

.history-item {
    background: #f7f7f7;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    font-size: 14px;
}

.small {
    color: gray;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="card">

    <h2>🗑 SMART BIN A2-2</h2>

    <p><b>Block:</b> A</p>
    <p><b>Floor:</b> 2</p>
    <p><b>Location:</b> Near Toilet</p>

    <hr>

    <h3>👷 On Duty Today</h3>
    <h3 id="dutyPerson">Kumar</h3>

    <hr>

    <h3 class="status-clean" id="status">Status: CLEAN</h3>
    <p class="small">Last Updated: <span id="lastUpdated">--</span></p>

    <button onclick="markClean()">Mark as CLEANED</button>

    <hr>

    <h3>📜 Cleaning History</h3>
    <div class="history-box" id="history">Loading...</div>

</div>

<script>

// 🔥 YOUR WORKING API
const API_URL = "https://script.google.com/macros/s/AKfycbxuxjYrmNr-FHJchOB0W5O-1pLGudOATw6K-M8vgorNuD0Cv87ElImjQdt89leOc_gP/exec";

let lock = false;

// ------------------ MARK CLEAN ------------------
function markClean() {

    if (lock) return;
    lock = true;

    let now = new Date();

    let data = {
        date: now.toISOString(),
        time: now.toISOString(),
        bin: "A2-2",
        cleaner: document.getElementById("dutyPerson").innerText,
        status: "CLEANED"
    };

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(() => {

        document.getElementById("status").innerText = "Status: CLEAN";
        document.getElementById("lastUpdated").innerText = formatTime(now);

        loadHistory();

        setTimeout(() => lock = false, 8000);
    })
    .catch(err => {
        console.log(err);
        lock = false;
    });
}

// ------------------ LOAD HISTORY ------------------
function loadHistory() {

    fetch(API_URL + "?t=" + Date.now())
    .then(res => res.json())
    .then(data => {

        let html = "";

        data.reverse().forEach(item => {

            let d = new Date(item.date);

            html += `
                <div class="history-item">
                    📅 ${d.toLocaleDateString()} | ⏰ ${formatTime(d)}<br>
                    🗑 Bin: ${item.bin}<br>
                    👷 ${item.cleaner} | ${item.status}
                </div>
            `;
        });

        document.getElementById("history").innerHTML = html;

    })
    .catch(err => {
        console.log(err);
        document.getElementById("history").innerHTML =
        "❌ Cannot load history";
    });
}

// ------------------ TIME FORMAT ------------------
function formatTime(date) {

    let h = date.getHours();
    let m = date.getMinutes();

    let ampm = h >= 12 ? "PM" : "AM";

    h = h % 12;
    h = h ? h : 12;

    m = m < 10 ? "0" + m : m;

    return h + ":" + m + " " + ampm;
}

// auto load
window.onload = loadHistory;

</script>

</body>
</html>
