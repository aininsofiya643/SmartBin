<!DOCTYPE html>
<html>
<head>
<title>Smart Bin System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <div class="title" id="binTitle">SMART BIN SYSTEM</div>

    <div class="section-title">📡 Loading bin...</div>

    <div id="binInfo" style="display:none;">

        <div class="section-title" id="block"></div>
        <div class="section-title" id="floor"></div>
        <div class="section-title" id="location"></div>

      <div class="section-title">👷 Select Cleaner</div>

<select id="cleanerSelect" style="
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
font-size:16px;
">
</select>
        <div class="status" id="status">Status: CLEAN</div>

        <div class="small">
            Last Updated: <span id="lastUpdated">--</span>
        </div>

        <button id="cleanBtn" onclick="markClean()">
            Mark as CLEANED
        </button>

        <div class="section-title">📜 Cleaning History</div>
        <div class="history" id="history">Loading...</div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
