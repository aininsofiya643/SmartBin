<!DOCTYPE html>
<html>
<head>
<title>Smart Bin System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<div class="card">

    <div class="title" id="binTitle">SMART BIN SYSTEM</div>

    <div class="section-title">📡 Scan QR or open link</div>

    <div id="binInfo" style="display:none;">

        <div class="section-title" id="block"></div>
        <div class="section-title" id="floor"></div>
        <div class="section-title" id="location"></div>

        <div class="section-title">👷 On Duty</div>
        <div id="dutyPerson">Kumar</div>

        <div class="status" id="status">Status: CLEAN</div>

        <div class="small">
            Last Updated: <span id="lastUpdated">--</span>
        </div>

        <button id="cleanBtn" onclick="markClean()">Mark as CLEANED</button>

        <div class="section-title">📜 History</div>
        <div class="history" id="history">Loading...</div>

    </div>

    <div class="section-title">📷 QR Scanner</div>
    <div id="reader"></div>

    <button onclick="startScanner()">Start QR Scan</button>

</div>

<script src="script.js"></script>

</body>
</html>
