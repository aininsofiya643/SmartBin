<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwXBREKPIBVzif2h9JVi5cbH0lpsPIaNymVeY8sPNClW05MjGxtNiXRObsyDVOv2gLG/exec";

let isLocked = false;

// ---------------- CLEAN BUTTON ----------------
function markClean() {

    if (isLocked) return; // STOP DOUBLE CLICK

    isLocked = true;

    let btn = document.getElementById("cleanBtn");
    btn.disabled = true;
    btn.innerText = "Saving...";

    let now = new Date();

    // FIXED TIME FORMAT BEFORE SEND
    let payload = {
        date: now.toISOString(),
        time: now.toISOString(),
        bin: "A2-2",
        cleaner: document.getElementById("dutyPerson").innerText,
        status: "CLEANED"
    };

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
    })
    .then(res => res.text())
    .then((res) => {

        console.log(res);

        document.getElementById("status").innerText = "Status: CLEAN";
        document.getElementById("lastUpdated").innerText = formatTime(now);

        loadHistory();

        // LOCK FOREVER AFTER SUCCESS
        btn.innerText = "Already CLEANED";
        btn.style.background = "gray";
        btn.disabled = true;

    })
    .catch(err => {

        console.log(err);

        isLocked = false;
        btn.disabled = false;
        btn.innerText = "Mark as CLEANED";
    });
}

// ---------------- LOAD HISTORY ----------------
function loadHistory() {

    fetch(API_URL + "?t=" + Date.now())
    .then(res => res.json())
    .then(data => {

        let html = "";

        data.reverse().forEach(item => {

            let d = new Date(item.date);

            html += `
                <div class="history-item">
                    📅 ${formatDate(d)} | ⏰ ${formatTime(d)}<br>
                    🗑 Bin: ${item.bin}<br>
                    👷 ${item.cleaner} | ${item.status}
                </div>
            `;
        });

        document.getElementById("history").innerHTML = html;

    })
    .catch(err => {
        document.getElementById("history").innerHTML =
        "❌ Cannot connect to Google Script";
    });
}

// ---------------- FIX DATE FORMAT (DD/MM/YYYY) ----------------
function formatDate(date) {

    let d = date.getDate();
    let m = date.getMonth() + 1;
    let y = date.getFullYear();

    return `${d.toString().padStart(2,'0')}/${m.toString().padStart(2,'0')}/${y}`;
}

// ---------------- FIX TIME FORMAT (3:14 AM) ----------------
function formatTime(date) {

    let h = date.getHours();
    let m = date.getMinutes();

    let ampm = h >= 12 ? "PM" : "AM";

    h = h % 12;
    h = h ? h : 12;

    m = m.toString().padStart(2, '0');

    return `${h}:${m} ${ampm}`;
}

window.onload = loadHistory;

</script>
